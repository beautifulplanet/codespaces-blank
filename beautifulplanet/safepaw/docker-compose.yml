# =============================================================
# NOPEnclaw Docker Compose — Local Development
# =============================================================
# SECURITY NOTES:
# 1. All passwords come from .env file (NEVER hardcode secrets)
# 2. Copy .env.example → .env before first run
# 3. Internal network for service-to-service communication
# 4. Containers run as non-root where possible
# 5. Images pinned by SHA256 digest (supply-chain integrity)
# 6. Gateway is the ONLY service with a host-exposed port
# =============================================================

services:
  # ------------------------------------------------
  # Gateway — WebSocket entry point (Go)
  # ------------------------------------------------
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: nopenclaw-gateway
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ADDR: "redis:6379"
      GATEWAY_PORT: "8080"
      REDIS_INBOUND_STREAM: "nopenclaw_inbound"
      REDIS_OUTBOUND_STREAM: "nopenclaw_outbound"
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_DEFAULT_TTL_HOURS: ${AUTH_DEFAULT_TTL_HOURS:-24}
      AUTH_MAX_TTL_HOURS: ${AUTH_MAX_TTL_HOURS:-168}
      TLS_ENABLED: ${TLS_ENABLED:-false}
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/certs/tls.crt}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-/certs/tls.key}
      TLS_PORT: ${TLS_PORT:-8443}
    ports:
      # Gateway is the ONLY service exposed to the host
      # This is intentional — it's the front door
      - "127.0.0.1:8080:8080"  # Bind to localhost ONLY (not 0.0.0.0)
    networks:
      - nopenclaw-internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------------
  # Router — Message processing (Go)
  # ------------------------------------------------
  # Reads from inbound stream via XREADGROUP consumer groups,
  # processes messages, writes to outbound stream for Gateway.
  # Internal only — no host-exposed ports.
  router:
    build:
      context: .
      dockerfile: services/router/Dockerfile
    container_name: nopenclaw-router
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ADDR: "redis:6379"
      REDIS_INBOUND_STREAM: "nopenclaw_inbound"
      REDIS_OUTBOUND_STREAM: "nopenclaw_outbound"
      CONSUMER_GROUP: "nopenclaw_routers"
      WORKER_COUNT: ${ROUTER_WORKER_COUNT:-4}
      BATCH_SIZE: ${ROUTER_BATCH_SIZE:-10}
      HEALTH_PORT: "8081"
    # NO ports exposed — Router is internal only.
    # Health check is accessible within the Docker network.
    networks:
      - nopenclaw-internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------------
  # Redis — Message queue (Streams)
  # ------------------------------------------------
  redis:
    image: redis:7-alpine@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    container_name: nopenclaw-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes --rename-command FLUSHALL "" --rename-command FLUSHDB "" --rename-command DEBUG ""
    networks:
      - nopenclaw-internal
    # PORTS INTENTIONALLY NOT EXPOSED TO HOST — services connect via Docker network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    # Resource limits prevent runaway containers from eating your RAM
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine@sha256:97ff59a4e30e08d1c11bdcd9455e7832368c0572b576c9092cde2df4ae5552a3
    container_name: nopenclaw-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - nopenclaw-internal
    # PORTS INTENTIONALLY NOT EXPOSED TO HOST — services connect via Docker network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  nopenclaw-internal:
    driver: bridge
    # internal: true removed — gateway needs to accept inbound connections
    # Redis and Postgres have no ports exposed, so they're still unreachable
    # from outside. The gateway is the ONLY exposed service (127.0.0.1:8080).

volumes:
  redis-data:
  postgres-data:
