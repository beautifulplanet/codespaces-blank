run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - gosec
    - prealloc
    - unconvert
    - misspell
    - gofmt

linters-settings:
  gosec:
    excludes:
      - G104 # unhandled errors on deferred Close() calls
      - G114 # http.ListenAndServe binding (we use server.ListenAndServe)
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: tools/
      linters:
        - gosec
