# ===========================================================
# InstallerClaw LITE demo — 3 services, minimal resources
# ===========================================================
# Wizard (Go)     :3000  — Setup UI + dashboard
# Gateway (Go)    :8080  — Security reverse proxy
# MockBackend (Go):18789 — Stands in for OpenClaw (internal)
#
# No Node.js, no npm, no Redis, no Postgres.
# Total RAM: ~200 MB. Build time: ~60 seconds.
# ===========================================================

services:
  wizard:
    build:
      context: ./services/wizard
      dockerfile: Dockerfile
    container_name: safepaw-wizard
    environment:
      WIZARD_PORT: "3000"
      WIZARD_ADMIN_PASSWORD: ${WIZARD_ADMIN_PASSWORD:-DemoPassword123!}
      SECURE_COOKIES: "false"
      OPENCLAW_HEALTH_URL: "http://mockbackend:18789/health"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - demo-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      mockbackend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: safepaw-gateway
    environment:
      GATEWAY_PORT: "8080"
      PROXY_TARGET: "http://mockbackend:18789"
      RATE_LIMIT: "60"
      AUTH_ENABLED: "false"
      LOG_FORMAT: "text"
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - demo-net
    depends_on:
      mockbackend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  mockbackend:
    build:
      context: ./services/mockbackend
      dockerfile: Dockerfile
    container_name: safepaw-mockbackend
    networks:
      - demo-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.15'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health"]
      interval: 5s
      timeout: 2s
      retries: 3

networks:
  demo-net:
    driver: bridge
